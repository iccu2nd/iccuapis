<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Health — ICCU APIS</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B0F1E;
  --panel: #131A2E;
  --panel-raised: #1B2440;
  --card: #161F38;
  --border: #263258;
  --border-strong: #3A4A82;
  --text: #EEF3FF;
  --text-dim: #9BA9CE;
  --text-faint: #6C7BA3;
  --accent: #4F86FF;
  --accent-hover: #7AA6FF;
  --accent-soft: rgba(79, 134, 255, 0.16);
  --ba-pink: #FF6FA5;
  --ba-yellow: #FFD54F;
  --good: #45E0A8;
  --good-soft: rgba(69, 224, 168, 0.14);
  --bad: #FF5C7A;
  --bad-soft: rgba(255, 92, 122, 0.14);
  --display: 'Baloo 2', 'Space Grotesk', sans-serif;
  --stat: 'JetBrains Mono', ui-monospace, monospace;
  --body: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --radius: 14px;
  --radius-sm: 9px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background:
    radial-gradient(circle at 8px 8px, rgba(122, 166, 255, 0.06) 1.4px, transparent 1.4px) 0 0 / 22px 22px,
    radial-gradient(1000px 560px at 90% -10%, rgba(79, 134, 255, 0.2), transparent 60%),
    var(--bg);
  background-attachment: fixed;
  color: var(--text);
  font-family: var(--body);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--accent-hover); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; }

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text-dim);
}
.back-link:hover { color: var(--accent); text-decoration: none; }

.topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px;
  background: rgba(19, 26, 46, 0.82);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.topbar::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -3px;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--ba-pink) 55%, var(--ba-yellow));
  opacity: 0.9;
}
.topbar-mark {
  display: flex;
  align-items: center;
  gap: 9px;
  font-family: var(--display);
  font-weight: 700;
  font-size: 15px;
  color: #fff;
}

.stage {
  max-width: 780px;
  margin: 0 auto;
  padding: 32px 22px 64px;
}

.page-head {
  margin-bottom: 20px;
}
.page-head h1 {
  font-family: var(--display);
  font-size: 26px;
  font-weight: 700;
  margin: 0 0 6px;
  letter-spacing: -0.01em;
  background: linear-gradient(100deg, #fff 40%, var(--accent-hover) 75%, var(--ba-pink));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.page-head p {
  margin: 0;
  color: var(--text-dim);
  font-size: 14.5px;
}

.status-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 20px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--good-soft);
  margin-bottom: 20px;
}
.status-banner.is-down {
  background: var(--bad-soft);
}
.status-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--good);
  flex-shrink: 0;
  animation: pulse 1.6s ease-in-out infinite;
}
.status-banner.is-down .status-dot {
  background: var(--bad);
  animation: none;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.status-banner-text {
  font-weight: 700;
  font-size: 16px;
  color: var(--good);
}
.status-banner.is-down .status-banner-text { color: var(--bad); }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  background: linear-gradient(160deg, var(--card), var(--panel));
  transition: border-color 0.15s ease, transform 0.15s ease;
}
.card:hover { border-color: var(--accent); transform: translateY(-2px); }
.card-label {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.card-value {
  font-family: var(--stat);
  font-weight: 700;
  font-size: 22px;
  color: var(--text);
}
.card.is-wide { grid-column: 1 / -1; }

.meta-row {
  margin-top: 16px;
  font-size: 12.5px;
  color: var(--text-faint);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-mark">
    <span>ICCU APIS</span>
  </div>
  <a href="/" class="back-link">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Kembali
  </a>
</header>

<main class="stage">
  <div class="page-head">
    <h1>Health</h1>
    <p>Status server secara langsung. Halaman ini refresh sendiri tiap beberapa detik.</p>
  </div>

  <div class="status-banner" id="statusBanner">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-banner-text" id="statusText">Memeriksa status...</span>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">Server Uptime</div>
      <div class="card-value" id="uptimeValue">—</div>
    </div>
    <div class="card">
      <div class="card-label">Cache Entries</div>
      <div class="card-value" id="cacheValue">—</div>
    </div>
    <div class="card is-wide">
      <div class="card-label">Last Checked</div>
      <div class="card-value" id="timestampValue" style="font-size: 15px;">—</div>
    </div>
  </div>
</main>

<script>
(() => {
  'use strict';

  const el = (id) => document.getElementById(id);
  const POLL_MS = 5000;

  let baseSeconds = null;
  let baseAt = null;
  let tickTimer = null;

  function formatUptime(totalSeconds) {
    const s = Math.max(0, Math.floor(totalSeconds));
    const hours = Math.floor(s / 3600);
    const minutes = Math.floor((s % 3600) / 60);
    const seconds = s % 60;
    return `${hours}h ${minutes}m ${seconds}s`;
  }

  function tick() {
    if (baseSeconds === null) return;
    const elapsed = (Date.now() - baseAt) / 1000;
    el('uptimeValue').textContent = formatUptime(baseSeconds + elapsed);
  }

  function setDown() {
    el('statusBanner').classList.add('is-down');
    el('statusText').textContent = 'Server tidak merespons';
    el('uptimeValue').textContent = '—';
    el('cacheValue').textContent = '—';
  }

  async function poll() {
    try {
      const res = await fetch('/api/health', { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      el('statusBanner').classList.remove('is-down');
      el('statusText').textContent = 'Server berjalan normal';

      if (typeof data.uptimeSeconds === 'number') {
        baseSeconds = data.uptimeSeconds;
        baseAt = Date.now();
        el('uptimeValue').textContent = formatUptime(baseSeconds);
        if (!tickTimer) tickTimer = setInterval(tick, 1000);
      }

      if (typeof data.cacheEntries === 'number') {
        el('cacheValue').textContent = data.cacheEntries.toLocaleString('id-ID');
      }

      if (data.timestamp) {
        const d = new Date(data.timestamp);
        el('timestampValue').textContent = d.toLocaleString('id-ID', {
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
      }
    } catch (err) {
      setDown();
    }
  }

  poll();
  setInterval(poll, POLL_MS);
})();
</script>

</body>
</html>
