<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Health — ICCU APIS</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Sora:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --panel: #F7F8FA;
  --panel-raised: #F0F2F5;
  --border: #E2E5EA;
  --border-strong: #CBD1DA;
  --text: #14161A;
  --text-dim: #565C68;
  --text-faint: #8A8F99;
  --accent: #2E5CFF;
  --accent-hover: #1E46E0;
  --accent-soft: #EAEFFF;
  --good: #17A860;
  --good-soft: #E7F8EF;
  --bad: #E0392B;
  --bad-soft: #FDECEA;
  --display: 'Space Grotesk', sans-serif;
  --stat: 'JetBrains Mono', ui-monospace, monospace;
  --body: 'IBM Plex Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --radius: 10px;
  --radius-sm: 7px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; }

.hamburger-btn {
  width: 38px;
  height: 38px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: background 0.12s ease;
}
.hamburger-btn:hover { background: var(--panel); }
.hamburger-btn span {
  display: block;
  width: 16px;
  height: 2px;
  border-radius: 2px;
  background: var(--text);
  transition: transform 0.2s ease, opacity 0.2s ease;
}
.hamburger-btn.is-open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.hamburger-btn.is-open span:nth-child(2) { opacity: 0; }
.hamburger-btn.is-open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

.menu-overlay {
  position: fixed;
  inset: 0;
  z-index: 45;
  background: rgba(20, 22, 26, 0.35);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.menu-overlay.is-open {
  opacity: 1;
  pointer-events: auto;
}

.hamburger-menu {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  z-index: 46;
  width: 78%;
  max-width: 300px;
  background: #fff;
  display: flex;
  flex-direction: column;
  padding: 22px 16px;
  gap: 2px;
  transform: translateX(100%);
  transition: transform 0.28s ease;
  box-shadow: -8px 0 32px rgba(20, 22, 26, 0.10);
}
.hamburger-menu.is-open {
  transform: translateX(0);
}
.hamburger-menu-title {
  font-family: var(--display);
  font-weight: 800;
  font-size: 15px;
  color: var(--text);
  padding: 6px 14px 16px;
}
.hamburger-menu-item {
  padding: 13px 14px;
  border-radius: var(--radius-sm);
  font-size: 16.5px;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
  transition: background 0.12s ease;
  display: flex;
  align-items: center;
  gap: 10px;
}
.hamburger-menu-item:hover { background: var(--panel); }
.hamburger-menu-item.is-active { color: var(--accent); background: var(--accent-soft); }

.topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px;
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
}
.topbar-mark {
  display: flex;
  align-items: center;
  gap: 9px;
  font-family: var(--display);
  font-weight: 700;
  font-size: 15px;
}

.stage {
  max-width: 780px;
  margin: 0 auto;
  padding: 32px 22px 64px;
}

.page-head {
  margin-bottom: 20px;
}
.page-head h1 {
  font-family: var(--display);
  font-size: 26px;
  font-weight: 700;
  margin: 0 0 6px;
  letter-spacing: -0.01em;
}
.page-head p {
  margin: 0;
  color: var(--text-dim);
  font-size: 14.5px;
}

.status-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 20px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--good-soft);
  margin-bottom: 20px;
}
.status-banner.is-down {
  background: var(--bad-soft);
}
.status-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--good);
  flex-shrink: 0;
  animation: pulse 1.6s ease-in-out infinite;
}
.status-banner.is-down .status-dot {
  background: var(--bad);
  animation: none;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.status-banner-text {
  font-weight: 700;
  font-size: 16px;
  color: var(--good);
}
.status-banner.is-down .status-banner-text { color: var(--bad); }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  background: #fff;
}
.card-label {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.card-value {
  font-family: var(--stat);
  font-weight: 700;
  font-size: 22px;
  color: var(--text);
}
.card.is-wide { grid-column: 1 / -1; }

.meta-row {
  margin-top: 16px;
  font-size: 12.5px;
  color: var(--text-faint);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-mark">
    <span>ICCU APIS</span>
  </div>
  <button class="hamburger-btn" id="hamburgerBtn" type="button" aria-label="Buka menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<main class="stage">
  <div class="page-head">
    <h1>Health</h1>
    <p>Status server secara langsung. Halaman ini refresh sendiri tiap beberapa detik.</p>
  </div>

  <div class="status-banner" id="statusBanner">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-banner-text" id="statusText">Memeriksa status...</span>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">Server Uptime</div>
      <div class="card-value" id="uptimeValue">—</div>
    </div>
    <div class="card">
      <div class="card-label">Cache Entries</div>
      <div class="card-value" id="cacheValue">—</div>
    </div>
    <div class="card is-wide">
      <div class="card-label">Last Checked</div>
      <div class="card-value" id="timestampValue" style="font-size: 15px;">—</div>
    </div>
  </div>
</main>

<div class="menu-overlay" id="menuOverlay"></div>

<div class="hamburger-menu" id="hamburgerMenu">
  <div class="hamburger-menu-title">Menu</div>
  <a href="/" class="hamburger-menu-item">
    <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/></svg>
    Beranda
  </a>
  <a href="/docs" class="hamburger-menu-item">
    <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    Docs
  </a>
  <a href="/logs" class="hamburger-menu-item">
    <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v2H4V4zm0 7h16v2H4v-2zm0 7h10v2H4v-2z" fill="currentColor"/></svg>
    Request Log
  </a>
  <a href="/health" class="hamburger-menu-item is-active">
    <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
    Health
  </a>
</div>

<script>
(() => {
  'use strict';

  const el = (id) => document.getElementById(id);
  const POLL_MS = 5000;

  let baseSeconds = null;
  let baseAt = null;
  let tickTimer = null;

  function formatUptime(totalSeconds) {
    const s = Math.max(0, Math.floor(totalSeconds));
    const hours = Math.floor(s / 3600);
    const minutes = Math.floor((s % 3600) / 60);
    const seconds = s % 60;
    return `${hours}h ${minutes}m ${seconds}s`;
  }

  function tick() {
    if (baseSeconds === null) return;
    const elapsed = (Date.now() - baseAt) / 1000;
    el('uptimeValue').textContent = formatUptime(baseSeconds + elapsed);
  }

  function setDown() {
    el('statusBanner').classList.add('is-down');
    el('statusText').textContent = 'Server tidak merespons';
    el('uptimeValue').textContent = '—';
    el('cacheValue').textContent = '—';
  }

  async function poll() {
    try {
      const res = await fetch('/api/health', { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      el('statusBanner').classList.remove('is-down');
      el('statusText').textContent = 'Server berjalan normal';

      if (typeof data.uptimeSeconds === 'number') {
        baseSeconds = data.uptimeSeconds;
        baseAt = Date.now();
        el('uptimeValue').textContent = formatUptime(baseSeconds);
        if (!tickTimer) tickTimer = setInterval(tick, 1000);
      }

      if (typeof data.cacheEntries === 'number') {
        el('cacheValue').textContent = data.cacheEntries.toLocaleString('id-ID');
      }

      if (data.timestamp) {
        const d = new Date(data.timestamp);
        el('timestampValue').textContent = d.toLocaleString('id-ID', {
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
      }
    } catch (err) {
      setDown();
    }
  }

  poll();
  setInterval(poll, POLL_MS);

  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const hamburgerMenu = document.getElementById('hamburgerMenu');
  const menuOverlay = document.getElementById('menuOverlay');

  function openMenu() {
    hamburgerBtn.classList.add('is-open');
    hamburgerBtn.setAttribute('aria-expanded', 'true');
    hamburgerMenu.classList.add('is-open');
    menuOverlay.classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }
  function closeMenu() {
    hamburgerBtn.classList.remove('is-open');
    hamburgerBtn.setAttribute('aria-expanded', 'false');
    hamburgerMenu.classList.remove('is-open');
    menuOverlay.classList.remove('is-open');
    document.body.style.overflow = '';
  }
  hamburgerBtn.addEventListener('click', () => {
    if (hamburgerMenu.classList.contains('is-open')) closeMenu();
    else openMenu();
  });
  menuOverlay.addEventListener('click', closeMenu);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && hamburgerMenu.classList.contains('is-open')) closeMenu();
  });
})();
</script>

</body>
</html>
